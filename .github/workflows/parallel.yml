name: Build (parallel)
# Double build minutes, same total duration!

# Steelmanned parallel layout: all independent quality checks run as separate
# jobs so GitHub can schedule them across runners simultaneously.  pytest
# waits only for lint (same dependency as the bitrab pipeline), letting
# mypy and precommit overlap with it.  Total wall-clock time is bounded by
# the slowest independent path, not the sum of all checks.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_LINK_MODE: copy
  UV_PROJECT_ENVIRONMENT: .venv
  UV_CACHE_DIR: .uv
  PACKAGE_DIR: bitrab

jobs:
  # ── package integrity ────────────────────────────────────────────────────
  build-and-inspect-package:
    name: Build & inspect package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2.17.0

  # ── shared setup step (cache warm-up) ───────────────────────────────────
  # Each quality job installs deps independently; the uv cache is shared via
  # actions/cache so the network hit only happens once per lockfile revision.

  # ── lint (ruff + pylint) ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .venv
            .uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: pip install uv
      - run: uv sync --all-extras
      - run: chmod +x scripts/*.sh && ./scripts/lint.sh

  # ── mypy ─────────────────────────────────────────────────────────────────
  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .venv
            .uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: pip install uv
      - run: uv sync --all-extras
      - run: chmod +x scripts/*.sh && ./scripts/mypy.sh

  # ── pre-commit ───────────────────────────────────────────────────────────
  precommit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .venv
            .uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: pip install uv
      - run: uv sync --all-extras
      - run: chmod +x scripts/*.sh && ./scripts/precommit.sh

  # ── pytest (needs lint) ──────────────────────────────────────────────────
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    # needs: [lint]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .venv
            .uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: pip install uv
      - run: uv sync --all-extras
      - run: chmod +x scripts/*.sh && ./scripts/pytest.sh

  # ── bandit ───────────────────────────────────────────────────────────────
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .venv
            .uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: pip install uv
      - run: uv sync --all-extras
      - run: chmod +x scripts/*.sh && ./scripts/bandit.sh

  # ── docs ─────────────────────────────────────────────────────────────────
  check-docs:
    name: Check docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .venv
            .uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: pip install uv
      - run: uv sync --all-extras
      - run: chmod +x scripts/*.sh && ./scripts/check_docs.sh

# Bitrab quality gate — runs the same checks as the GitHub Actions workflows
# but inside a single container, multithreaded (parallel backend).
# All quality jobs run concurrently in the "test" stage; only pytest depends
# on lint passing first (keeps fast feedback on style errors).

image: python:3.11-slim

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  UV_LINK_MODE: copy
  UV_PROJECT_ENVIRONMENT: .venv
  UV_CACHE_DIR: .uv
  PACKAGE_DIR: bitrab

stages:
  - setup
  - test
  - security
  - docs
  - build

cache:
  key:
    files:
      - pyproject.toml
      - uv.lock
  paths:
    - .venv/
    - .uv/
    - .cache/

# ---------------------------------------------------------------------------
# SETUP
# ---------------------------------------------------------------------------

install:
  stage: setup
  rules:
    - if: "$CI_PIPELINE_SOURCE != 'local'"
  script: >-
    uv sync --all-extras

# ---------------------------------------------------------------------------
# TEST STAGE  (lint, mypy, precommit run in parallel; pytest waits for lint)
# ---------------------------------------------------------------------------

lint:
  stage: test
  script: >-
    ./scripts/lint.sh
  allow_failure: false

mypy:
  stage: test
  script: >-
    ./scripts/mypy.sh
  allow_failure: false

precommit:
  stage: test
  script: >-
    ./scripts/precommit.sh
  allow_failure: false

pytest:
  stage: test
  needs: ["lint"]
  script: >-
    ./scripts/pytest.sh
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - htmlcov/
      - coverage.xml

# ---------------------------------------------------------------------------
# SECURITY STAGE
# ---------------------------------------------------------------------------

bandit:
  stage: security
  script: >-
    ./scripts/bandit.sh
  allow_failure: false

# ---------------------------------------------------------------------------
# DOCS STAGE
# ---------------------------------------------------------------------------

check_docs:
  stage: docs
  script: >-
    ./scripts/check_docs.sh
  allow_failure: false

build_docs:
  stage: docs
  script: >-
    ./scripts/build_docs.sh
  artifacts:
    paths:
      - docs/

# ---------------------------------------------------------------------------
# BUILD STAGE
# ---------------------------------------------------------------------------

build_package:
  stage: build
  script: >-
    ./scripts/build_package.sh
  artifacts:
    paths:
      - dist/
